node:
  hostname: howell
  facility: ARK H212, Akron Ohio
  gpus: 8x NVIDIA B300 SXM6 AC
  gpus_detail:
    count: 8
    model: NVIDIA B300 SXM6 AC
    compute_capability: sm_103a
    vram_per_gpu_mib: 275040
    vram_total_mib: 2200320
  driver: 595.58.03
  driver_type: open kernel module
  cuda_runtime: "13.2"
  previous_driver: 590.48.01
  os: Ubuntu 22.04.5 LTS
  kernel: 5.15.0-119-generic
  python: 3.10.12
  cpu:
    model: Intel(R) Xeon(R) 6776P
    sockets: 2
    cores_per_socket: 64
    threads_per_core: 2
    total_threads: 256
  ram:
    total: 2.0 TiB
    swap: 8.0 GiB
  fabric_manager: "590 (compatible, running)"
  probed_at: 2026-04-16

containers:
  sglang:
    image: lmsysorg/sglang:latest-cu130-runtime
    sglang_version: 0.5.10.post1
    python: 3.12
    pulled: 2026-04-16
    notes: |
      Same SGLang version as previous driver cycle (0.5.10.post1) but
      the new driver 595.58 may resolve the EP+NVFP4 modelopt loader
      crash that was observed on 590.48 — the shape mismatch in
      modelopt_quant.py:1754 (w13_input_scale[256] vs w13_weight_scale_2[32])
      could have been a driver/NCCL interaction bug rather than pure
      Python logic. Testing EP=8 on all models is the primary objective.

goal: |
  Re-benchmark all 5 NVFP4 models with EP+NVFP4 enabled (TP=8 EP=8)
  on driver 595.58.03. Compare against the TP-only (EP=1) baseline
  from the 590.48 cycle in ~/benchmark/results/. All 1k1k profiles
  first, then 1k4k and 4k1k later.

ep_config:
  tp: 8
  ep: 8
  moe_a2a_backend: deepep
  moe_runner_backend: flashinfer_trtllm
  deepep_mode: auto
  quantization: modelopt_fp4

expert_divisibility_check:
  minimax_m2.7:    { routed: 256, shared: 0, routed_div_8: 32, ok: true }
  kimi_k2.5:       { routed: 384, shared: 1, routed_div_8: 48, ok: true }
  glm_5_1:         { routed: 256, shared: 1, routed_div_8: 32, ok: true }
  deepseek_r1:     { routed: 256, shared: 1, routed_div_8: 32, ok: true }
  qwen3_5_397b:    { routed: 512, shared: "1 (shared_expert_intermediate_size=1024)", routed_div_8: 64, ok: true }

previous_results_location: ~/benchmark/results/
new_results_location: ~/benchmark/results_595/
