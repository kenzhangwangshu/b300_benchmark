  vllm_gb300_blog_2026_02_13:
    hardware: 2x B300
    checkpoint: nvidia/DeepSeek-R1-0528-NVFP4   # different checkpoint than ours
    peak_prefill_TGS: 22476                      # EP2, batch=64, ISL=2048 OSL=1
    peak_mixed_TGS: 3072                         # TP2, ISL=2048 OSL=1024
  verda_sglang_guide_2026:
    hardware: 4x B300
