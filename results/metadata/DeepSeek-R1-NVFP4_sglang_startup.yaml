known_issues:
  - |
    TORCHINDUCTOR_COMPILE_THREADS=1 is MANDATORY on this container for R1
    (and likely any DeepSeek V3 class model that happens to hit the
    vocab_parallel_embedding dynamo-decorated path first). Do not drop
    this env var. If a future SGLang release fixes the compile-worker
    CUDA init, revisit. See bringup_problem block above.
  - |
    Container launched without HF_TOKEN — "unauthenticated requests"
    warnings at startup. Safe to ignore on this model since weights
    are already cached locally.
  - |
    2 min 49 s gap between KV cache allocation and CUDA graph capture.
    No logging in that window from our grep'd lines — most likely
    flashinfer_trtllm JIT warmup + internal NSA backend prep. Shorter
    than GLM-5.1's equivalent gap.
